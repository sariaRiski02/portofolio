<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Head -->
  <circle cx="100" cy="75" r="35" fill="#f3e8ff" opacity="0.9"/>
  
  <!-- Face details -->
  <circle cx="90" cy="70" r="4" fill="#1f2937"/>
  <circle cx="110" cy="70" r="4" fill="#1f2937"/>
  
  <!-- Smile -->
  <path d="M 90 80 Q 100 85 110 80" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Hair -->
  <path d="M 70 60 Q 70 45 100 40 Q 130 45 130 60" fill="#1f2937"/>
  <path d="M 75 50 Q 80 42 100 40" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  
  <!-- Neck -->
  <rect x="92" y="105" width="16" height="12" fill="#f3e8ff" opacity="0.9"/>
  
  <!-- Shoulders and body -->
  <ellipse cx="100" cy="130" rx="45" ry="50" fill="#8b5cf6" opacity="0.8"/>
  
  <!-- Shirt accent -->
  <path d="M 60 120 Q 70 125 100 128 Q 130 125 140 120 L 145 160 Q 100 165 55 160 Z" fill="#7c3aed"/>
  
  <!-- Tech accent - small code icon -->
  <g transform="translate(145, 95)">
    <path d="M -8 -5 L 0 0 L -8 5 M 8 -5 L 0 0 L 8 5" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
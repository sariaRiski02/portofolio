<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2e1065;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e0f4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="30" cy="30" r="20" fill="url(#accentGrad)" opacity="0.1"/>
  <circle cx="170" cy="170" r="25" fill="url(#accentGrad)" opacity="0.1"/>
  
  <!-- Main circle container -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="28" fill="#d4d4d8"/>
  
  <!-- Hair -->
  <path d="M 72 50 Q 72 35 100 32 Q 128 35 128 50 L 128 65 Q 100 75 72 65 Z" fill="#18181b"/>
  
  <!-- Face -->
  <circle cx="100" cy="70" r="26" fill="#f5f5f5"/>
  
  <!-- Eyes -->
  <circle cx="90" cy="65" r="3.5" fill="#18181b"/>
  <circle cx="110" cy="65" r="3.5" fill="#18181b"/>
  <!-- Eye shine -->
  <circle cx="91" cy="64" r="1.5" fill="#ffffff"/>
  <circle cx="111" cy="64" r="1.5" fill="#ffffff"/>
  
  <!-- Nose -->
  <line x1="100" y1="65" x2="100" y2="75" stroke="#a1a1a1" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Smile -->
  <path d="M 90 78 Q 100 83 110 78" stroke="#18181b" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="93" y="95" width="14" height="10" fill="#f5f5f5"/>
  
  <!-- Shoulders and body with gradient -->
  <ellipse cx="100" cy="135" rx="50" ry="55" fill="url(#accentGrad)" opacity="0.9"/>
  
  <!-- Shirt/clothing detail -->
  <path d="M 52 115 L 60 120 L 70 122 L 100 125 L 130 122 L 140 120 L 148 115 L 150 160 Q 100 168 50 160 Z" fill="#3b82f6" opacity="0.8"/>
  
  <!-- Tech elements - code brackets -->
  <g transform="translate(155, 85)" opacity="0.6" filter="url(#glow)">
    <path d="M -6 -8 L -2 0 L -6 8" stroke="#a855f7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 6 -8 L 2 0 L 6 8" stroke="#a855f7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Tech accent - dots -->
  <circle cx="35" cy="155" r="2" fill="#a855f7" opacity="0.5"/>
  <circle cx="45" cy="160" r="2" fill="#a855f7" opacity="0.5"/>
  <circle cx="165" cy="145" r="2" fill="#3b82f6" opacity="0.5"/>
  
  <!-- Bottom accent line -->
  <line x1="60" y1="185" x2="140" y2="185" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3"/>
</svg>